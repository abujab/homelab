# Traefik Helm values for HomeLab ingress foundation.
#
# Chart: traefik/traefik
# Chart version: 41.0.2
# App version: v3.7.6

deployment:
  replicas: 2

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

providers:
  kubernetesCRD:
    enabled: true
    ingressClass: traefik
  kubernetesIngress:
    enabled: true
    ingressClass: traefik
    publishedService:
      enabled: true

gateway:
  enabled: false

gatewayClass:
  enabled: false

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: false

service:
  enabled: true
  spec:
    type: LoadBalancer
    loadBalancerIP: 192.168.68.201

ports:
  traefik:
    expose:
      default: false
  web:
    expose:
      default: true
    exposedPort: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    expose:
      default: true
    exposedPort: 443

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: traefik-ingress
          topologyKey: kubernetes.io/hostname
