apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: ingress
  labels:
    app.kubernetes.io/name: whoami
    app.kubernetes.io/part-of: homelab-ingress-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: whoami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whoami
        app.kubernetes.io/part-of: homelab-ingress-test
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.11
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
