apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: networking
  labels:
    app.kubernetes.io/name: pihole
    app.kubernetes.io/part-of: homelab-networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pihole
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pihole
        app.kubernetes.io/part-of: homelab-networking
    spec:
      containers:
        - name: pihole
          image: pihole/pihole@sha256:f7d1be836e3bc608b56d82fc9904f5a831cdfbc0dc9c6d58f94e4c985c70038b
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Berlin
            - name: FTLCONF_dns_listeningMode
              value: ALL
            - name: FTLCONF_dns_upstreams
              value: 1.1.1.1;1.0.0.1;9.9.9.9
            - name: FTLCONF_misc_dnsmasq_lines
              value: address=/pihole.home.arpa/192.168.68.201;address=/test.home.arpa/192.168.68.201
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-admin
                  key: password
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
          readinessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /admin/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pihole-config
