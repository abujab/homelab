apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-config
  namespace: networking
  labels:
    app.kubernetes.io/name: pihole
    app.kubernetes.io/part-of: homelab-networking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path
