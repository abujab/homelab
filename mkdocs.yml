
site_name: Abdul's HomeLab
site_description: Enterprise-inspired private cloud and hybrid homelab platform
site_author: Abdul Jabbar
repo_url: https://github.com/abujab/homelab
repo_name: abujab/homelab

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Overview:
      - Vision: overview/vision.md
      - Architecture: overview/architecture.md
      - Repository: overview/repository.md
      - Roadmap: overview/roadmap.md
  - Architecture Decisions:
      - ADR-0001 Operating System: decisions/ADR-0001-operating-system.md
      - ADR-0002 Configuration Management: decisions/ADR-0002-configuration-management.md
      - ADR-0003 Kubernetes Distribution: decisions/ADR-0003-kubernetes-distribution.md
      - ADR-0004 Storage: decisions/ADR-0004-storage.md
      - ADR-0005 GitOps: decisions/ADR-0005-gitops.md
      - ADR-0006 Repository Structure: decisions/ADR-0006-repository-structure.md
      - ADR-0007 Target Architecture: decisions/ADR-0007-homelab-target-architecture.md
      - ADR-0008 Networking Foundation: decisions/ADR-0008-networking-foundation.md
      - ADR-0009 Wired Network: decisions/ADR-0009-wired-network-for-cluster-nodes.md
      - ADR-0010 Ingress Foundation: decisions/ADR-0010-ingress-foundation.md
      - ADR-0011 PKI and TLS: decisions/ADR-0011-pki-and-tls-foundation.md
      - ADR-0012 Application Exposure: decisions/ADR-0012-application-exposure-through-shared-ingress.md
      - ADR Template: decisions/ADR-template.md
  - Infrastructure:
      - Raspberry Pi Cluster: infrastructure/raspberry-pi-cluster.md
      - Ansible: infrastructure/ansible.md
      - Kubernetes: infrastructure/kubernetes.md
      - Networking: infrastructure/networking.md
      - Ingress: infrastructure/ingress.md
      - PKI: infrastructure/pki.md
      - Storage: infrastructure/storage.md
      - Security: infrastructure/security.md
  - Operations:
      - Bootstrap: operations/bootstrap.md
      - Updating: operations/updating.md
      - Ingress: operations/ingress.md
      - Certificates: operations/certificates.md
      - Rebuilding: operations/rebuilding.md
      - Troubleshooting: operations/troubleshooting.md
      - Backup: operations/backup.md
  - Reference:
      - Overview: reference/index.md
      - Infrastructure Inventory: reference/infrastructure-inventory.md
      - Naming and Addressing: reference/naming-and-addressing.md
      - Software Inventory: reference/software-inventory.md
      - Service Catalog: reference/service-catalog.md
      - Decision Register: reference/decision-register.md
      - Glossary: reference/glossary.md
  - Development:
      - Workflow: development/workflow.md
      - Architecture Review: development/architecture-review.md
