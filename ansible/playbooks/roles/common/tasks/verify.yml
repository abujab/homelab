---
# ==============================================================================
# Task file: verify.yml
#
# Purpose
# -------
# Validate that the node baseline is ready for Kubernetes.
#
# These checks do not change the system. They only fail early if a required
# assumption is not true.
# ==============================================================================

- name: Verify swap is disabled
  ansible.builtin.command: swapon --show
  register: swap_status
  changed_when: false
  failed_when: swap_status.stdout != ""

- name: Verify chrony service is running
  ansible.builtin.service_facts:

- name: Assert chrony is active
  ansible.builtin.assert:
    that:
      - ansible_facts.services['chrony.service'].state == 'running'
    fail_msg: "chrony is not running"
    success_msg: "chrony is running"

- name: Verify kernel command line contains K3s cgroup settings
  ansible.builtin.command: cat /proc/cmdline
  register: proc_cmdline
  changed_when: false

- name: Assert cgroup settings are active
  ansible.builtin.assert:
    that:
      - "'cgroup_enable=cpuset' in proc_cmdline.stdout"
      - "'cgroup_memory=1' in proc_cmdline.stdout"
      - "'cgroup_enable=memory' in proc_cmdline.stdout"
    fail_msg: "Required cgroup settings are missing. Reboot may be required."
    success_msg: "Required cgroup settings are active"

- name: Verify Python is available
  ansible.builtin.command: python3 --version
  register: python_version
  changed_when: false

- name: Show Python version
  ansible.builtin.debug:
    var: python_version.stdout