---
# ==============================================================================
# Playbook: baseline.yml
#
# Purpose
# -------
# Prepare every Raspberry Pi with a common baseline before we install Kubernetes.
#
# Think of this as the equivalent of creating a "golden server image".
# Every node should have the same:
#
#   • Time configuration
#   • Base software
#   • Networking tools
#   • SSH configuration
#   • Kernel configuration
#
# This ensures every Pi behaves identically.
# ==============================================================================

- name: Baseline configuration for Raspberry Pi nodes

  # "hosts" tells Ansible WHICH machines to run on.
  #
  # Here we are using the inventory GROUP called "pis",
  # not individual host names.
  #
  # Inventory:
  #
  # all
  # └── pis
  #     ├── pi4mB01
  #     ├── pi4mB02
  #     ├── pi4mB03
  #     └── pi4mB04
  #
  hosts: pis

  # Many of the tasks require root privileges.
  #
  # Instead of writing "sudo" for every command,
  # become:true tells Ansible to automatically use sudo.
  #
  become: true

  tasks:

    # --------------------------------------------------------------------------
    # Set timezone
    #
    # Why?
    #
    # We live in Germany.
    #
    # Every log file
    # Every Kubernetes event
    # Every monitoring graph
    #
    # should use Europe/Berlin time.
    #
    # Otherwise troubleshooting becomes confusing.
    #
    # Example:
    #
    # Grafana says service restarted at 03:15 UTC
    # Journal says 05:15 CEST
    #
    # Same event...
    # different timezone.
    # --------------------------------------------------------------------------

    - name: Set timezone to Europe/Berlin
      community.general.timezone:
        name: Europe/Berlin

    # --------------------------------------------------------------------------
    # Refresh the APT package cache
    #
    # Why?
    #
    # Debian-based systems maintain a local catalogue of all available software.
    #
    # This cache contains:
    #
    #   • Package names
    #   • Available versions
    #   • Dependencies
    #   • Download locations
    #
    # It is equivalent to running:
    #
    #     sudo apt update
    #
    # We separate this from package installation because:
    #
    #   1. It makes the playbook easier to understand.
    #   2. Package installation should only install software.
    #   3. Cache refresh has its own lifecycle.
    #
    # cache_valid_time tells Ansible:
    #
    # "If the package cache is less than one hour old,
    #  don't refresh it again."
    #
    # This has several advantages:
    #
    #   • Faster playbook execution
    #   • Less network traffic
    #   • Cleaner Ansible output
    #
    # If we omitted cache_valid_time, every execution would behave like
    # running "apt update", even when nothing has changed.
    # --------------------------------------------------------------------------

    - name: Refresh APT package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    # --------------------------------------------------------------------------
    # Install packages
    #
    # These are our "Swiss Army Knife" utilities.
    #
    # curl      -> Call REST APIs
    # wget      -> Download files
    # git       -> Source control
    # vim       -> Editor
    # htop      -> Better task manager
    # net-tools -> ifconfig, netstat
    # dnsutils  -> dig, nslookup
    # chrony    -> Time synchronization
    #
    # Kubernetes nodes rely on accurate clocks.
    #
    # Certificates
    # Tokens
    # Logs
    #
    # all depend on synchronized time.
    # --------------------------------------------------------------------------

    - name: Install baseline packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - dnsutils
          - ca-certificates
          - gnupg
          - lsb-release
          - chrony
        state: present

    # --------------------------------------------------------------------------
    # Enable Chrony
    #
    # Chrony keeps the system clock synchronized with NTP servers.
    #
    # Imagine every Pi slowly drifting a few seconds each day.
    #
    # Kubernetes would eventually have certificate validation
    # problems and logs would become difficult to correlate.
    #
    # Chrony prevents this.
    # --------------------------------------------------------------------------

    - name: Ensure chrony is enabled and running
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: true

    # --------------------------------------------------------------------------
    # Disable swap
    #
    # Kubernetes requires swap to be disabled.
    #
    # Why?
    #
    # Kubernetes schedules workloads based on available memory.
    #
    # If Linux secretly swaps memory to disk,
    # Kubernetes no longer has an accurate view of available RAM.
    #
    # Therefore Kubernetes officially recommends:
    #
    # Swap = OFF
    # --------------------------------------------------------------------------

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    # --------------------------------------------------------------------------
    # Remove swap from fstab
    #
    # swapoff disables swap NOW.
    #
    # But after reboot...
    #
    # Linux would enable swap again.
    #
    # Therefore we comment out the swap entry in /etc/fstab.
    #
    # Think of this as making the change permanent.
    # --------------------------------------------------------------------------

    - name: Remove swap entries from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    # --------------------------------------------------------------------------
    # Enable Linux cgroups
    #
    # Why?
    #
    # Kubernetes needs Linux Control Groups to manage CPU and memory limits for
    # containers.
    #
    # This task is written idempotently:
    #
    #   • If the setting is missing, it adds it.
    #   • If the setting already exists, it does nothing.
    #
    # This avoids repeatedly appending the same kernel parameters every time the
    # playbook is run.
    # --------------------------------------------------------------------------

    - name: Enable cpuset cgroup for K3s
      ansible.builtin.replace:
        path: /boot/firmware/cmdline.txt
        regexp: '^(?!.*\bcgroup_enable=cpuset\b)(.*)$'
        replace: '\1 cgroup_enable=cpuset'
      register: cgroup_cpuset_update

    - name: Enable memory cgroup accounting for K3s
      ansible.builtin.replace:
        path: /boot/firmware/cmdline.txt
        regexp: '^(?!.*\bcgroup_memory=1\b)(.*)$'
        replace: '\1 cgroup_memory=1'
      register: cgroup_memory_accounting_update

    - name: Enable memory cgroup controller for K3s
      ansible.builtin.replace:
        path: /boot/firmware/cmdline.txt
        regexp: '^(?!.*\bcgroup_enable=memory\b)(.*)$'
        replace: '\1 cgroup_enable=memory'
      register: cgroup_memory_controller_update

    # --------------------------------------------------------------------------
    # Reboot
    #
    # Kernel boot parameters only become active after reboot.
    #
    # Ansible is smart enough to:
    #
    # 1. reboot the Pi
    # 2. wait until SSH is available
    # 3. continue automatically
    #
    # We only reboot if cmdline.txt was modified.
    # --------------------------------------------------------------------------

    - name: Reboot if kernel command line changed
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: >
        cgroup_cpuset_update.changed or
        cgroup_memory_accounting_update.changed or
        cgroup_memory_controller_update.changed
