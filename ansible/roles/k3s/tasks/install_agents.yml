---
# ==============================================================================
# Task file: agent.yml
#
# Purpose
# -------
# Join worker nodes to the K3s cluster.
#
# Worker nodes run application workloads. They connect to the K3s server using:
#
#   • K3S_URL   -> address of the control-plane API
#   • K3S_TOKEN -> shared join token from the server
# ==============================================================================

- name: Determine the primary K3s server
  ansible.builtin.set_fact:
    k3s_server: "{{ groups['k3s_server'][0] }}"

- name: Install K3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL=https://{{ hostvars[k3s_server].ansible_host }}:6443 \
    K3S_TOKEN={{ hostvars[k3s_server].k3s_token }} \
    sh -
  args:
    creates: /etc/systemd/system/k3s-agent.service

- name: Ensure K3s agent is running
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true