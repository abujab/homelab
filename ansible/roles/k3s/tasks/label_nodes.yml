---
# ==============================================================================
# Task file: labels.yml
#
# Purpose
# -------
# Apply Kubernetes role labels to cluster nodes.
#
# Why?
# ----
# Kubernetes worker nodes do not receive a "worker" role label by default.
# Adding the label improves readability when viewing cluster nodes.
#
# The labels do not change Kubernetes behaviour. They are primarily for
# administration and documentation.
# ==============================================================================

- name: Label worker nodes
  ansible.builtin.command:
    cmd: >
      kubectl label node {{ item | lower }}
      node-role.kubernetes.io/worker=worker
      --overwrite
  loop: "{{ groups['k3s_agents'] }}"
  run_once: true
  delegate_to: "{{ groups['k3s_server'][0] }}"
  changed_when: false