---
# ==============================================================================
# Task file: preflight.yml
#
# Purpose
# -------
# Verify Ethernet is ready before changing Wi-Fi state.
# ==============================================================================

- name: Check Ethernet interface exists
  ansible.builtin.command:
    cmd: "ip link show dev {{ network_ethernet_interface }}"
  register: network_preflight_ethernet_link
  changed_when: false
  failed_when: false

- name: Assert Ethernet interface exists
  ansible.builtin.assert:
    that:
      - network_preflight_ethernet_link.rc == 0
    fail_msg: >-
      {{ inventory_hostname }} failed network preflight: expected
      {{ network_ethernet_interface }} to exist. Detected:
      {{ network_preflight_ethernet_link.stderr | default(network_preflight_ethernet_link.stdout) }}
    success_msg: "{{ inventory_hostname }} network preflight: {{ network_ethernet_interface }} exists"

- name: Check Ethernet operational state
  ansible.builtin.command:
    cmd: "cat /sys/class/net/{{ network_ethernet_interface }}/operstate"
  register: network_preflight_ethernet_operstate
  changed_when: false

- name: Assert Ethernet is operationally up
  ansible.builtin.assert:
    that:
      - network_preflight_ethernet_operstate.stdout | trim == 'up'
    fail_msg: >-
      {{ inventory_hostname }} failed network preflight: expected
      {{ network_ethernet_interface }} operstate to be up. Detected:
      {{ network_preflight_ethernet_operstate.stdout | trim }}
    success_msg: "{{ inventory_hostname }} network preflight: {{ network_ethernet_interface }} is up"

- name: Check Ethernet IPv4 address
  ansible.builtin.command:
    cmd: "ip -4 -o addr show dev {{ network_ethernet_interface }} scope global"
  register: network_preflight_ethernet_ipv4
  changed_when: false

- name: Assert Ethernet has the inventory IPv4 address
  ansible.builtin.assert:
    that:
      - ansible_host in network_preflight_ethernet_ipv4.stdout
    fail_msg: >-
      {{ inventory_hostname }} failed network preflight: expected
      {{ network_ethernet_interface }} to carry inventory address
      {{ ansible_host }}. Detected: {{ network_preflight_ethernet_ipv4.stdout | default('no IPv4 address') }}
    success_msg: >-
      {{ inventory_hostname }} network preflight: {{ network_ethernet_interface }}
      carries inventory address {{ ansible_host }}

- name: Check route to inventory address
  ansible.builtin.command:
    cmd: "ip route get {{ ansible_host }}"
  register: network_preflight_inventory_route
  changed_when: false

- name: Assert inventory address is local to Ethernet
  ansible.builtin.assert:
    that:
      - ansible_host in network_preflight_inventory_route.stdout
      - ('dev ' ~ network_ethernet_interface) in network_preflight_inventory_route.stdout or ('local ' ~ ansible_host) in network_preflight_inventory_route.stdout
    fail_msg: >-
      {{ inventory_hostname }} failed network preflight: expected inventory address
      {{ ansible_host }} to be reachable through {{ network_ethernet_interface }}.
      Detected route: {{ network_preflight_inventory_route.stdout }}
    success_msg: >-
      {{ inventory_hostname }} network preflight: inventory address {{ ansible_host }}
      is present on {{ network_ethernet_interface }}

- name: Check default IPv4 route
  ansible.builtin.command:
    cmd: ip -4 route show default
  register: network_preflight_default_route
  changed_when: false

- name: Assert default route uses Ethernet and expected gateway
  ansible.builtin.assert:
    that:
      - ('dev ' ~ network_ethernet_interface) in network_preflight_default_route.stdout
      - ('via ' ~ network_expected_gateway) in network_preflight_default_route.stdout
    fail_msg: >-
      {{ inventory_hostname }} failed network preflight: expected default route via
      {{ network_expected_gateway }} dev {{ network_ethernet_interface }}. Detected:
      {{ network_preflight_default_route.stdout | default('no default route') }}
    success_msg: >-
      {{ inventory_hostname }} network preflight: default route uses
      {{ network_expected_gateway }} dev {{ network_ethernet_interface }}
