---
# ==============================================================================
# Global Ansible variables
#
# Purpose
# -------
# Variables in this file apply to every host in the inventory.
#
# This is the right place for shared settings such as:
#
#   • SSH username
#   • SSH key
#   • common timezone
#   • common package choices
#
# Host-specific values should go into host_vars instead.
# ==============================================================================

# Linux user used by Ansible when connecting over SSH.
ansible_user: abdul

# Private key used for SSH authentication.
#
# The key is unlocked once through ssh-agent, so Ansible can connect to all Pis
# without repeatedly asking for the key passphrase.
ansible_ssh_private_key_file: ~/.ssh/id_ed25519_personal
