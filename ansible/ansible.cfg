# ==============================================================================
# Ansible project configuration
#
# Purpose
# -------
# This file tells Ansible how to behave when commands are run from this directory.
#
# Without this file, every command would need explicit options like:
#
#   ansible-playbook -i inventories/home/hosts.yml playbooks/update.yml
#
# With this file, Ansible automatically knows:
#
#   • where the inventory is
#   • which Python interpreter to use
#   • how many hosts to manage in parallel
# ==============================================================================

[defaults]

# Use the home lab inventory by default.
inventory = inventories/home/hosts.yml

# Use the standard Python 3 interpreter on the Raspberry Pis.
interpreter_python = /usr/bin/python3

# Use the home lab roles by default.
roles_path = roles

# Disable host key checking for the lab environment.
#
# In production, this should usually stay enabled.
# For a home lab where machines are rebuilt often, disabling it avoids friction.
host_key_checking = False

# Manage up to four hosts in parallel.
#
# We currently have four Raspberry Pis, so this allows Ansible to work on all of
# them at the same time.
forks = 4